<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CanvassTrack</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; background: #000; }
#map { position: absolute; inset: 0; z-index: 1; }

#toppill {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 1000; background: rgba(0,0,0,.75); backdrop-filter: blur(10px);
  border-radius: 30px; padding: 10px 20px;
  display: flex; align-items: center; gap: 10px;
  border: 1px solid rgba(255,255,255,.12); white-space: nowrap;
}
.logo { font-size: 15px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: #f5a623; }
.logo span { color: #fff; }
#dot { width: 8px; height: 8px; border-radius: 50%; background: #444; transition: all .3s; flex-shrink: 0; }
#dot.on { background: #f5a623; box-shadow: 0 0 6px #f5a623; animation: blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
#timer { font-size: 13px; font-weight: 700; color: #f5a623; display: none; }
#timer.show { display: block; }

#bottom {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
  padding: 16px 16px 60px;
  background: linear-gradient(0deg, rgba(0,0,0,.95) 60%, transparent);
  display: flex; gap: 12px;
}
#trackBtn {
  flex: 1; padding: 20px; border: none; border-radius: 16px; cursor: pointer;
  font-size: 17px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
  background: #f5a623; color: #000; transition: transform .1s, background .2s;
}
#trackBtn:active { transform: scale(.97); }
#trackBtn.stop { background: #e03b3b; color: #fff; }

#toast {
  position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
  z-index: 1000; background: rgba(0,0,0,.85); color: #fff;
  border-radius: 20px; padding: 10px 20px; font-size: 14px; font-weight: 600;
  white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity .25s;
  max-width: 90vw; white-space: normal; text-align: center;
}
#toast.show { opacity: 1; }

#sheet-bg {
  position: absolute; inset: 0; z-index: 2000;
  background: rgba(0,0,0,.5); backdrop-filter: blur(4px);
  display: none; align-items: flex-end;
}
#sheet-bg.open { display: flex; }
#sheet {
  width: 100%; background: #1a1a1a; border-radius: 24px 24px 0 0;
  padding: 12px 20px 48px; animation: up .2s ease;
  border-top: 1px solid rgba(255,255,255,.1);
}
@keyframes up { from{transform:translateY(30px);opacity:0} to{transform:none;opacity:1} }
.drag-handle { width: 40px; height: 4px; background: #444; border-radius: 2px; margin: 0 auto 18px; }
.sheet-title { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 4px; }
.sheet-addr { font-size: 13px; color: #888; margin-bottom: 16px; min-height: 18px; }
.status-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.stag {
  padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
  border: 1.5px solid #333; color: #888; cursor: pointer; transition: all .15s;
}
.stag.sel { background: rgba(255,255,255,.08); }
.stag[data-s="Dropped Lit"]    { --c:#f5a623; }
.stag[data-s="No Answer"]      { --c:#888; }
.stag[data-s="Spoke to Owner"] { --c:#4a9eff; }
.stag[data-s="Interested"]     { --c:#00c9a7; }
.stag[data-s="Appointment"]    { --c:#a855f7; }
.stag { color: var(--c); }
.stag.sel { border-color: var(--c); }
textarea {
  width: 100%; background: #111; border: 1px solid #333; border-radius: 12px;
  color: #fff; font-family: inherit; font-size: 15px; padding: 12px 14px;
  resize: none; height: 80px; outline: none; margin-bottom: 14px;
}
textarea::placeholder { color: #555; }
textarea:focus { border-color: #f5a623; }
.sheet-btns { display: flex; gap: 10px; }
.btn-save { flex:1; padding:16px; background:#f5a623; color:#000; border:none; border-radius:14px; font-size:16px; font-weight:800; cursor:pointer; }
.btn-cancel { padding:16px 20px; background:#222; color:#888; border:none; border-radius:14px; font-size:15px; cursor:pointer; }

.you-dot { width:14px; height:14px; border-radius:50%; background:#4a9eff; border:3px solid #fff; box-shadow:0 0 0 5px rgba(74,158,255,.25); }
.pin-dot { width:13px; height:13px; border-radius:50% 50% 50% 0; border:2px solid #fff; transform:rotate(-45deg); box-shadow:0 2px 8px rgba(0,0,0,.5); }

.leaflet-popup-content-wrapper { background:#1a1a1a; color:#fff; border-radius:12px; border:1px solid #333; box-shadow:0 4px 20px rgba(0,0,0,.6); }
.leaflet-popup-tip { background:#1a1a1a; }
.leaflet-popup-content { margin:12px 14px; }
</style>
</head>
<body>
<div id="map"></div>

<div id="toppill">
  <div class="logo">Canvass<span>Track</span></div>
  <div id="dot"></div>
  <div id="timer"></div>
</div>

<div id="toast"></div>

<div id="bottom">
  <button id="trackBtn">▶ Start Tracking</button>
</div>

<div id="sheet-bg">
  <div id="sheet">
    <div class="drag-handle"></div>
    <div class="sheet-title">📍 Log this stop</div>
    <div class="sheet-addr" id="sheet-addr"></div>
    <div class="status-row">
      <div class="stag" data-s="Dropped Lit">Dropped Lit</div>
      <div class="stag" data-s="No Answer">No Answer</div>
      <div class="stag" data-s="Spoke to Owner">Spoke to Owner</div>
      <div class="stag" data-s="Interested">Interested</div>
      <div class="stag" data-s="Appointment">Appointment</div>
    </div>
    <textarea id="notes" placeholder="Notes — roof age, damage, owner name…"></textarea>
    <div class="sheet-btns">
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn-save" id="btn-save">Save Pin</button>
    </div>
  </div>
</div>

<script>
const STATUS_COLORS = {
  'Dropped Lit':'#f5a623','No Answer':'#888','Spoke to Owner':'#4a9eff',
  'Interested':'#00c9a7','Appointment':'#a855f7'
};
const SESSION_COLORS = ['#f5a623','#00c9a7','#4a9eff','#e03b3b','#a855f7','#f97316'];

const api = {
  get:   p    => fetch(p).then(r=>r.json()),
  post:  (p,b)=> fetch(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json()),
  patch: p    => fetch(p,{method:'PATCH'}).then(r=>r.json()),
};

let map, youMarker;
let tracking=false, watchId=null, curSession=null, curLine=null;
let startTime=null, timerInt=null;
let sessions=[], pins=[];
let allLines=[], allPinMarkers=[];
let coordBuffer=[], pendingLL=null, selStatus='';

// Map
map = L.map('map',{zoomControl:false,attributionControl:false}).setView([38.85,-76.53],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

// Tap map to pin
map.on('click', e => { if (tracking) openSheet(e.latlng); });

// Toast
let tTimer;
function toast(msg, ms=2500) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(tTimer); tTimer=setTimeout(()=>el.classList.remove('show'),ms);
}

// Load
async function load() {
  try {
    [sessions,pins]=await Promise.all([api.get('/api/sessions'),api.get('/api/pins')]);
    renderAll();
  } catch(e){}
}

function sessionColor(i){return SESSION_COLORS[i%SESSION_COLORS.length];}

function renderAll() {
  allLines.forEach(l=>map.removeLayer(l));
  allPinMarkers.forEach(m=>map.removeLayer(m));
  allLines=[]; allPinMarkers=[];
  sessions.forEach((s,i)=>{
    if(s.coords&&s.coords.length>1){
      const pl=L.polyline(s.coords.map(c=>[c.lat,c.lng]),{color:s.color||sessionColor(i),weight:5,opacity:.8}).addTo(map);
      allLines.push(pl);
    }
  });
  pins.forEach(p=>renderPin(p));
}

function renderPin(pin) {
  const color=STATUS_COLORS[pin.status]||'#f5a623';
  const icon=L.divIcon({html:`<div class="pin-dot" style="background:${color}"></div>`,iconSize:[13,13],iconAnchor:[6,13],className:''});
  const m=L.marker([pin.lat,pin.lng],{icon})
    .bindPopup(`<div style="min-width:140px"><div style="font-weight:800;font-size:14px;margin-bottom:4px">${pin.address||'Stop'}</div><div style="color:${color};font-weight:700;font-size:12px">${pin.status||'–'}</div>${pin.notes?`<div style="color:#aaa;font-size:12px;margin-top:4px">${pin.notes}</div>`:''}</div>`)
    .addTo(map);
  allPinMarkers.push(m);
}

function setYou(lat,lng) {
  if(youMarker) map.removeLayer(youMarker);
  const icon=L.divIcon({html:'<div class="you-dot"></div>',iconSize:[14,14],iconAnchor:[7,7],className:''});
  youMarker=L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(map);
}

// Tracking
document.getElementById('trackBtn').addEventListener('click',()=>{ tracking?stopT():startT(); });

function startT() {
  if(!('geolocation' in navigator)){toast('GPS not available');return;}
  toast('Finding your location…',3000);
  navigator.geolocation.getCurrentPosition(async pos=>{
    const {latitude:lat,longitude:lng}=pos.coords;
    const id=Date.now()+'';
    const color=sessionColor(sessions.length);
    try{await api.post('/api/sessions',{id,color});}catch(e){}
    curSession={id,color,coords:[],started_at:new Date().toISOString()};
    curLine=L.polyline([],{color,weight:5,opacity:.85}).addTo(map);
    tracking=true;
    document.getElementById('trackBtn').textContent='⏹ Stop Tracking';
    document.getElementById('trackBtn').classList.add('stop');
    document.getElementById('dot').classList.add('on');
    document.getElementById('timer').classList.add('show');
    startTime=Date.now();
    timerInt=setInterval(tickTimer,1000);
    map.setView([lat,lng],16);
    setYou(lat,lng);
    watchId=navigator.geolocation.watchPosition(onPos,onPosErr,{enableHighAccuracy:true,maximumAge:2000,timeout:20000});
    toast('Tracking — tap map to drop a pin');
  },err=>{
    const m={1:'Location denied — check Settings → Privacy → Location',2:'GPS unavailable',3:'GPS timed out — try again'};
    toast(m[err.code]||'GPS error',4000);
  },{enableHighAccuracy:true,timeout:15000});
}

function onPos(pos){
  const {latitude:lat,longitude:lng}=pos.coords;
  setYou(lat,lng);
  if(!curSession)return;
  const coord={lat,lng,ts:new Date().toISOString()};
  curSession.coords.push(coord);
  curLine.addLatLng([lat,lng]);
  coordBuffer.push(coord);
  if(coordBuffer.length>=8)flushCoords();
}
function onPosErr(err){
  const m={1:'Location denied',2:'GPS unavailable',3:'GPS timed out'};
  toast(m[err.code]||'GPS error',3000);
}

async function flushCoords(){
  if(!curSession||!coordBuffer.length)return;
  const batch=[...coordBuffer];coordBuffer=[];
  try{await api.post(`/api/sessions/${curSession.id}/coords`,{coords:batch});}
  catch(e){coordBuffer=[...batch,...coordBuffer];}
}

async function stopT(){
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
  clearInterval(timerInt);timerInt=null;
  await flushCoords();
  if(curSession){
    try{await api.patch(`/api/sessions/${curSession.id}/end`);}catch(e){}
    sessions.push({...curSession});
    if(curLine)allLines.push(curLine);
    toast(`Route saved — ${curSession.coords.length} points`);
  }
  tracking=false;curSession=null;curLine=null;startTime=null;
  document.getElementById('trackBtn').textContent='▶ Start Tracking';
  document.getElementById('trackBtn').classList.remove('stop');
  document.getElementById('dot').classList.remove('on');
  document.getElementById('timer').classList.remove('show');
  document.getElementById('timer').textContent='';
}

function tickTimer(){
  if(!startTime)return;
  const s=Math.floor((Date.now()-startTime)/1000);
  document.getElementById('timer').textContent=`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

// Pin sheet
function openSheet(latlng){
  pendingLL=latlng; selStatus='';
  document.getElementById('notes').value='';
  document.getElementById('sheet-addr').textContent='Getting address…';
  document.querySelectorAll('.stag').forEach(t=>t.classList.remove('sel'));
  reverseGeocode(latlng.lat,latlng.lng).then(addr=>{
    document.getElementById('sheet-addr').textContent=addr;
  });
  document.getElementById('sheet-bg').classList.add('open');
}

document.querySelectorAll('.stag').forEach(tag=>{
  tag.addEventListener('click',()=>{
    document.querySelectorAll('.stag').forEach(t=>t.classList.remove('sel'));
    tag.classList.add('sel'); selStatus=tag.dataset.s;
  });
});

document.getElementById('btn-cancel').addEventListener('click',()=>{
  document.getElementById('sheet-bg').classList.remove('open'); pendingLL=null;
});

document.getElementById('btn-save').addEventListener('click',async()=>{
  if(!pendingLL)return;
  const addr=document.getElementById('sheet-addr').textContent;
  const pin={
    id:Date.now()+'', lat:pendingLL.lat, lng:pendingLL.lng,
    address:['Getting address…','Unknown location'].includes(addr)?'':addr,
    status:selStatus||'Dropped Lit',
    notes:document.getElementById('notes').value.trim(),
    sessionId:curSession?curSession.id:null
  };
  try{const saved=await api.post('/api/pins',pin);pins.push(saved);renderPin(saved);toast('Pin saved ✓');}
  catch(e){toast('Could not save — check connection',3000);}
  document.getElementById('sheet-bg').classList.remove('open'); pendingLL=null;
});

document.getElementById('sheet-bg').addEventListener('click',e=>{
  if(e.target===document.getElementById('sheet-bg')){
    document.getElementById('sheet-bg').classList.remove('open'); pendingLL=null;
  }
});

async function reverseGeocode(lat,lng){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,{headers:{'Accept-Language':'en'}});
    const d=await r.json(); const a=d.address||{};
    const parts=[a.house_number&&a.road?`${a.house_number} ${a.road}`:a.road,a.city||a.town||a.village||a.county].filter(Boolean);
    return parts.join(', ')||'Unknown location';
  }catch(e){return 'Unknown location';}
}

load();
</script>
</body>
</html>
